<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pasanaku</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        h1, h2 { color: #2c3e50; }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { 
            width: calc(100% - 22px); 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 16px;
        }
        button { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-size: 16px; 
            margin-top: 10px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #2ecc71; }
        .btn-sorteo { 
            background-color: #2980b9; 
            width: 100%; 
            font-size: 18px; 
            padding: 12px;
        }
        .btn-sorteo:hover { background-color: #3498db; }
        .btn-eliminar { 
            background: #e74c3c; 
            padding: 5px 10px; 
            margin: 0; 
            font-size: 12px; 
        }
        .btn-eliminar:hover { background: #c0392b; }
        ul { list-style-type: none; padding: 0; }
        li { 
            background: #ecf0f1; 
            margin: 8px 0; 
            padding: 10px 15px; 
            border-radius: 5px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .results { 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 2px dashed #bdc3c7; 
            display: none; 
        }
        .turn { 
            background: #e8f8f5; 
            border-left: 5px solid #1abc9c; 
            margin: 10px 0; 
            padding: 15px; 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gestor de Pasanaku 💸</h1>
        <p>Añade los participantes y la cuota para sortear los turnos.</p>

        <div class="form-group">
            <label for="cuota">Cuota por persona (Ej: 100 Bs):</label>
            <input type="number" id="cuota" placeholder="Monto de la cuota" min="1">
        </div>

        <div class="form-group">
            <label for="nombre">Nombre del Participante:</label>
            <input type="text" id="nombre" placeholder="Nombre completo" onkeypress="handleEnter(event)">
            <button onclick="agregarParticipante()">+ Añadir</button>
        </div>

        <h3>Participantes (<span id="contador">0</span>)</h3>
        <ul id="lista-participantes"></ul>

        <button class="btn-sorteo" onclick="sortearPasanaku()">🎲 ¡Sortear Turnos!</button>

        <div class="results" id="resultados">
            <h2>Resultados del Sorteo</h2>
            <p>💰 <strong>Pozo total a entregar por turno:</strong> <span id="pozo-total">0</span></p>
            <div id="lista-turnos"></div>
        </div>
    </div>

    <script>
        let participantes = [];

        // Permite añadir presionando la tecla "Enter"
        function handleEnter(event) {
            if (event.key === "Enter") {
                agregarParticipante();
            }
        }

        function agregarParticipante() {
            const inputNombre = document.getElementById('nombre');
            const nombre = inputNombre.value.trim();

            if (nombre !== '') {
                participantes.push(nombre);
                inputNombre.value = ''; // Limpia el input
                inputNombre.focus(); // Devuelve el cursor al input
                actualizarLista();
            } else {
                alert('Por favor, ingresa un nombre válido.');
            }
        }

        function eliminarParticipante(index) {
            participantes.splice(index, 1);
            actualizarLista();
        }

        function actualizarLista() {
            const lista = document.getElementById('lista-participantes');
            const contador = document.getElementById('contador');
            lista.innerHTML = '';
            contador.textContent = participantes.length;

            participantes.forEach((p, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${p}</span> <button class="btn-eliminar" onclick="eliminarParticipante(${index})">X</button>`;
                lista.appendChild(li);
            });
            
            // Ocultar resultados si se modifica la lista después de sortear
            document.getElementById('resultados').style.display = 'none';
        }

        // Algoritmo de Fisher-Yates para mezclar aleatoriamente
        function mezclarArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function sortearPasanaku() {
            const inputCuota = document.getElementById('cuota').value;

            if (participantes.length < 2) {
                alert('Necesitas al menos 2 participantes para iniciar el Pasanaku.');
                return;
            }
            if (!inputCuota || inputCuota <= 0) {
                alert('Por favor, ingresa una cuota válida mayor a 0.');
                return;
            }

            // Calcular pozo (cuota * cantidad de participantes)
            const pozoTotal = participantes.length * parseFloat(inputCuota);
            
            // Crear una copia del array y mezclarla
            const participantesSorteados = mezclarArray([...participantes]);

            // Mostrar resultados
            document.getElementById('resultados').style.display = 'block';
            document.getElementById('pozo-total').textContent = pozoTotal.toFixed(2);

            const listaTurnos = document.getElementById('lista-turnos');
            listaTurnos.innerHTML = '';

            // Generar la visualización de los turnos
            participantesSorteados.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'turn';
                div.innerHTML = `<strong>Mes / Turno ${index + 1}:</strong> 👤 ${p} se lleva el pozo.`;
                listaTurnos.appendChild(div);
            });
        }
    </script>
</body>
</html>
